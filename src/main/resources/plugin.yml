name: ApolloSupport
main: moe.illusory.ApolloSupportPlugin
version: ${version}
author: AstralStudio
description: Bridges offline-mode player identities to premium display UUIDs so Lunar Client can render cosmetics without changing server-side player data.
commands:
  apollosupport:
    aliases:
      - asupport
      - lunarcosmetics
    permission: apollosupport.admin
    description: ApolloSupport administration command.
permissions:
  apollosupport.admin:
    description: Allows reloading and inspecting ApolloSupport.
    default: op
